<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koofr Hermes</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --orange: #d29922;
  --red: #f85149;
  --radius: 6px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header h1 span { color: var(--text2); font-weight: 400; font-size: 14px; }
.status { font-size: 12px; color: var(--text2); margin-left: auto; }
.status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.status .dot.online { background: var(--green); }
.status .dot.offline { background: var(--red); }

/* Search */
.search-bar {
  display: flex;
  gap: 8px;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.search-bar input[type=text] {
  flex: 1;
  min-width: 200px;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
}
.search-bar input[type=text]:focus {
  border-color: var(--accent);
  outline: none;
}
.filter-group { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.filter-btn {
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  font-size: 12px;
  transition: all .15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.filter-count { font-size: 11px; color: var(--text2); padding: 0 8px; }

/* Breadcrumbs */
.breadcrumbs {
  padding: 8px 20px;
  font-size: 13px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}
.breadcrumbs a { color: var(--text2); font-size: 13px; }
.breadcrumbs a:hover { color: var(--text); }
.breadcrumbs .sep { color: var(--border); margin: 0 2px; }

/* Content area */
.content { padding: 12px 20px; }

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--text2);
  padding: 8px 0;
  flex-wrap: wrap;
}
.stat-item { display: flex; align-items: center; gap: 4px; }
.stat-val { color: var(--text); font-weight: 500; }

/* Table / grid */
.file-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.file-table th {
  text-align: left;
  padding: 8px 8px;
  border-bottom: 1px solid var(--border);
  color: var(--text2);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  user-select: none;
}
.file-table td {
  padding: 4px 8px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  vertical-align: middle;
}
.file-table tr:hover td { background: var(--surface); }
.file-table tr.dir-row td { font-weight: 500; }
.file-icon { margin-right: 6px; font-size: 14px; }
.file-name { max-width: 300px; }
.dir-name { max-width: 300px; }
.file-table .col-size { text-align: right; width: 80px; }
.file-table .col-date { width: 160px; color: var(--text2); }
.file-table .col-type { width: 100px; color: var(--text2); font-size: 11px; }
.file-table .col-thumb { width: 64px; }

/* Thumbnail cell */
.thumb-cell {
  width: 56px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  overflow: hidden;
  background: var(--surface2);
}
.thumb-cell img {
  width: 56px;
  height: 40px;
  object-fit: cover;
  border-radius: 4px;
  display: block;
  cursor: pointer;
  transition: opacity .2s;
}
.thumb-cell img:hover { opacity: 0.8; }
.thumb-placeholder {
  width: 56px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text2);
  border-radius: 4px;
  background: var(--surface2);
}
.thumb-placeholder.dir {
  cursor: pointer;
  transition: background .2s;
}
.thumb-placeholder.dir:hover { background: var(--border); }

/* View toggle */
.view-group { display: flex; gap: 2px; }
.view-btn {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  font-size: 14px;
  transition: all .15s;
}
.view-btn:hover { border-color: var(--accent); color: var(--text); }
.view-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Grid view */
.grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; padding: 4px 0; }
.grid-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .15s, transform .15s;
}
.grid-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.grid-card .grid-thumb {
  width: 100%; height: 160px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface2);
  overflow: hidden;
}
.grid-card .grid-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.grid-card .grid-thumb .thumb-placeholder { width: 100%; height: 100%; font-size: 32px; background: var(--surface2); }
.grid-card .grid-info { padding: 8px 10px; }
.grid-card .grid-name {
  font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.grid-card .grid-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.grid-card.dir-card { cursor: pointer; }
.grid-card.dir-card .grid-thumb { background: var(--surface2); }

/* Reel view */
.reel-view {
  width: 100%; max-width: 100%;
  height: 80vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  user-select: none;
  touch-action: none;
  overscroll-behavior: contain;
}
.reel-item {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  position: relative;
}
.reel-item.active { display: flex; }
.reel-item img, .reel-item video {
  max-width: 100%; max-height: 65vh;
  object-fit: contain;
  border-radius: 6px;
  box-shadow: 0 4px 24px rgba(0,0,0,.5);
}
.reel-item .reel-icon {
  font-size: 80px; padding: 60px 0;
  background: var(--surface2); border-radius: 8px;
  width: 100%; text-align: center;
}
.reel-info {
  margin-top: 12px; text-align: center;
  color: var(--text2); font-size: 13px;
}
.reel-info .reel-name { color: var(--text); font-size: 14px; }
.reel-nav {
  position: fixed; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.08); border: none; color: var(--text);
  font-size: 28px; padding: 16px 14px; cursor: pointer; z-index: 150;
  border-radius: 4px; transition: background .15s;
}
.reel-nav:hover { background: rgba(255,255,255,.18); }
.reel-nav.prev { left: 12px; }
.reel-nav.next { right: 12px; }
.reel-counter {
  position: fixed;
  top: 12px;
  right: 16px;
  background: rgba(0,0,0,.6);
  color: #fff;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  z-index: 100;
}
.reel-hint {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,.55);
  color: #fff;
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 13px;
  z-index: 100;
  pointer-events: none;
  animation: fadeHint 3s ease-out forwards;
}
@keyframes fadeHint {
  0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
  20% { opacity: 1; transform: translateX(-50%) translateY(0); }
  80% { opacity: 1; }
  100% { opacity: 0; }
}
.reel-item {
  animation: fadeIn .3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: scale(.95); }
  to { opacity: 1; transform: scale(1); }
}

  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.5); color: var(--text2); font-size: 12px;
  padding: 4px 12px; border-radius: 12px; z-index: 150;
}

/* Pagination */
.pagination {
  display: flex;
  justify-content: center;
  gap: 4px;
  padding: 16px 0;
  flex-wrap: wrap;
}
.page-btn {
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  font-size: 12px;
}
.page-btn:hover:not(.active):not(:disabled) { border-color: var(--accent); }
.page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.page-btn:disabled { opacity: 0.4; cursor: default; }

/* File detail modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  max-width: 480px;
  width: 90%;
  position: relative;
}
.modal h3 { margin-bottom: 12px; font-size: 16px; }
.modal table { width: 100%; font-size: 13px; }
.modal table td:first-child { color: var(--text2); padding-right: 12px; white-space: nowrap; }
.modal table td:last-child { word-break: break-all; }
.modal-close {
  position: absolute; top: 8px; right: 12px;
  background: none; border: none; color: var(--text2); font-size: 20px;
  cursor: pointer;
}
.modal-close:hover { color: var(--text); }

/* Preview lightbox */
.preview-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
  flex-direction: column;
}
.preview-overlay.open { display: flex; }
.preview-image {
  max-width: 90vw;
  max-height: 80vh;
  object-fit: contain;
  border-radius: 4px;
  box-shadow: 0 4px 24px rgba(0,0,0,.5);
}
.preview-info {
  margin-top: 12px;
  font-size: 14px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 16px;
}
.preview-info .pi-name { color: var(--text); }
.preview-close {
  position: fixed; top: 16px; right: 20px;
  background: none; border: none; color: var(--text2); font-size: 32px;
  cursor: pointer; z-index: 201; line-height: 1;
}
.preview-close:hover { color: var(--text); }
.preview-nav {
  position: fixed; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.08);
  border: none; color: var(--text);
  font-size: 28px;
  padding: 16px 12px;
  cursor: pointer;
  z-index: 201;
  border-radius: 4px;
  transition: background .15s;
  line-height: 1;
}
.preview-nav:hover { background: rgba(255,255,255,.15); }
.preview-nav.prev { left: 16px; }
.preview-nav.next { right: 16px; }
.preview-nav:disabled { opacity: 0.2; cursor: default; }

/* Loading / empty */
.loading { color: var(--text2); text-align: center; padding: 40px; font-size: 14px; }
.empty-state { color: var(--text2); text-align: center; padding: 60px 20px; }
.empty-state h3 { color: var(--text); margin-bottom: 8px; }
.error-state { color: var(--red); text-align: center; padding: 40px; }

/* Responsive */
@media (max-width: 768px) {
  /* Header & search */
  .header {
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
    padding: 12px 12px 8px;
  }
  .header h1 { font-size: 18px; }
  .status { margin-left: 0; font-size: 12px; }
  .search-bar {
    flex-direction: column;
    gap: 8px;
    padding: 0 12px 8px;
  }
  .search-bar input {
    font-size: 15px;
    padding: 10px 10px;
    width: 100%;
    box-sizing: border-box;
  }
  .filter-group {
    flex-wrap: wrap;
    gap: 6px;
    box-sizing: border-box;
    width: 100%;
  }
  .filter-btn {
    padding: 6px 10px;
    font-size: 12px;
    flex-shrink: 1;
    min-width: 0;
  }
  .view-group { gap: 4px; }
  .view-btn {
    padding: 6px 10px;
    font-size: 16px;
  }
  .breadcrumbs {
    padding: 10px 12px;
    font-size: 12px;
    flex-wrap: wrap;
    gap: 0;
  }
  .content { padding: 0 8px; }

  /* Stats bar */
  .stats-bar {
    font-size: 12px;
    gap: 10px;
    padding: 10px 12px;
  }

  /* Table: hide size/date/type, thin rows */
  .file-table .col-date,
  .file-table .col-type,
  .file-table .col-size { display: none; }
  .file-table th,
  .file-table td {
    padding: 6px 6px;
    font-size: 13px;
  }
  .file-table .col-thumb { width: 36px; }
  .thumb-cell { width: 32px; height: 24px; }
  .thumb-cell img { width: 32px; height: 24px; }
  .thumb-placeholder { width: 32px; height: 24px; font-size: 14px; }

  /* Grid: two columns */
  .grid-view {
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .grid-card .grid-thumb { height: 120px; }
  .grid-card .grid-info { padding: 6px 8px; }
  .grid-card .grid-name { font-size: 11px; }
  .grid-card .grid-meta { font-size: 10px; }

  /* Reel: full-screen immersive */
  .reel-view {
    height: 100dvh; /* dynamic viewport, avoids mobile address bar jump */
    padding: 0;
  }
  .reel-item {
    min-height: 100dvh;
    padding: 56px 0 0; /* leave room for counter */
  }
  .reel-item img,
  .reel-item video {
    max-height: 75dvh;
    max-width: 100vw;
    border-radius: 0;
  }
  .reel-item .reel-icon {
    font-size: 60px;
    padding: 80px 12px;
    width: calc(100vw - 24px);
    box-sizing: border-box;
    border-radius: 0;
  }
  .reel-info {
    margin-top: 10px;
    padding: 0 16px;
    font-size: 12px;
  }
  .reel-info .reel-name { font-size: 13px; max-width: 90vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .reel-counter {
    top: 8px;
    right: 8px;
    font-size: 12px;
    padding: 5px 10px;
  }
  .reel-hint {
    bottom: 14px;
    font-size: 12px;
    padding: 6px 14px;
  }
  .reel-nav {
    padding: 14px 10px;
    font-size: 22px;
    background: rgba(0,0,0,.45);
  }
  .reel-nav.prev { left: 6px; }
  .reel-nav.next { right: 6px; }

  /* Preview lightbox */
  .preview-image {
    max-width: 95vw;
    max-height: 70dvh;
  }
  .preview-close {
    top: 10px;
    right: 14px;
    font-size: 28px;
  }
  .preview-nav {
    padding: 14px 10px;
    font-size: 22px;
  }
  .preview-nav.prev { left: 8px; }
  .preview-nav.next { right: 8px; }

  /* Modal */
  .modal {
    width: calc(100vw - 32px);
    max-height: 80vh;
    overflow-y: auto;
    border-radius: 8px;
    padding: 14px;
  }
  .modal-close {
    top: 8px;
    right: 10px;
    font-size: 24px;
    padding: 6px 10px;
  }

  /* Pagination */
  .pagination { gap: 4px; }
  .page-btn {
    padding: 7px 10px;
    font-size: 13px;
    min-width: 10px;
  }

  /* File name links in table/grid */
  .file-name,
  .dir-name {
    font-size: 13px;
  }

  /* Prevent iOS zoom-on-tap for controls */
  button, .file-table td, .grid-card, .reel-item {
    touch-action: manipulation;
  }

  /* Search input on iOS */
  input[type="text"] {
    font-size: 16px; /* prevents ios zoom on focus */
  }
}

/* Small phones */
@media (max-width: 420px) {
  .header h1 { font-size: 16px; }
  .grid-view { grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .grid-card .grid-thumb { height: 100px; }
  .filter-btn {
    padding: 5px 8px;
    font-size: 11px;
  }
  .reel-nav,
  .preview-nav {
    padding: 12px 8px;
    font-size: 20px;
  }
}
</style>
</head>
<body>
<div class="header">
  <h1>📁 Koofr Hermes <span id="version"></span></h1>
  <div class="status" id="statusBar">
    <span class="dot offline" id="statusDot"></span>
    <span id="statusText">Connecting...</span>
  </div>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search files by name..." autocomplete="off">
  <div class="filter-group" id="filterGroup">
    <button class="filter-btn active" data-type="all">All</button>
    <button class="filter-btn" data-type="video">🎬 Video</button>
    <button class="filter-btn" data-type="image">🖼 Image</button>
    <button class="filter-btn" data-type="audio">🎵 Audio</button>
    <button class="filter-btn" data-type="document">📄 Document</button>
    <button class="filter-btn" data-type="archive">📦 Archive</button>
    <span class="filter-count" id="filterCount"></span>
    <div class="view-group">
      <button class="view-btn active" data-view="table" title="Table">☰</button>
      <button class="view-btn" data-view="grid" title="Grid">⊞</button>
      <button class="view-btn" data-view="reel" title="Reel">⤢</button>
    </div>
  </div>
</div>

<div class="breadcrumbs" id="breadcrumbs">
  <a href="#" onclick="showBrowse('/')">Koofr</a>
</div>

<div class="content" id="content">
  <div class="loading">Loading catalog...</div>
</div>

<div class="pagination" id="pagination"></div>

<!-- File detail modal -->
<div id="fileModal" class="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3 id="modalTitle"></h3>
    <table id="modalBody"></table>
  </div>
</div>

<!-- Preview lightbox -->
<div id="previewOverlay" class="preview-overlay" onclick="closePreview(event)">
  <button class="preview-close" onclick="closePreview()">&times;</button>
  <button class="preview-nav prev" id="prevBtn" onclick="previewNav(-1)">&#x276E;</button>
  <button class="preview-nav next" id="nextBtn" onclick="previewNav(1)">&#x276F;</button>
  <img id="previewImage" class="preview-image" src="" alt="Preview" style="display:none"><video id="previewVideo" class="preview-image" src="" controls autoplay playsinline style="display:none"></video>
  <div class="preview-info">
    <span class="pi-name" id="previewName"></span>
    <span id="previewMeta"></span>
    <a id="previewOpenLink" href="#" target="_blank" style="color:var(--accent)">Open ↗</a>
  </div>
</div>

<script>
// ── State ──
let state = {
  view: 'browse',           // 'browse' | 'search'
  path: '/',
  query: '',
  type: 'all',
  page: 1,
  perPage: 50,
  total: 0,
  currentDir: null,
  viewMode: 'table',        // 'table' | 'grid' | 'reel'
  reelStartPath: null,      // path to open in reel view when switching modes
};
// Preview gallery state
let previewItems = [];       // list of {path, name, size, content_type}
let previewIndex = -1;

// ── Helpers ──
function fmtSize(bytes) {
  if (!bytes) return '-';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  let i = 0;
  let v = bytes;
  while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
  return v.toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
}

function fmtDate(ms) {
  if (!ms) return '-';
  const d = new Date(ms);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function fmtType(ct) {
  if (!ct) return '-';
  const map = {
    'video/mp4': 'MP4', 'video/x-matroska': 'MKV', 'video/avi': 'AVI',
    'video/quicktime': 'MOV', 'video/webm': 'WebM', 'video/x-ms-wmv': 'WMV',
    'image/jpeg': 'JPEG', 'image/png': 'PNG', 'image/gif': 'GIF',
    'image/webp': 'WebP', 'image/svg+xml': 'SVG',
    'audio/mpeg': 'MP3', 'audio/ogg': 'OGG', 'audio/wav': 'WAV',
    'audio/flac': 'FLAC', 'audio/aac': 'AAC',
    'application/pdf': 'PDF',
  };
  return map[ct] || ct.split('/').pop() || '-';
}

function fileIcon(file) {
  const ct = (file.content_type || '').toLowerCase();
  if (ct.startsWith('video/')) return '🎬';
  if (ct.startsWith('image/')) return '🖼';
  if (ct.startsWith('audio/')) return '🎵';
  if (ct.startsWith('application/pdf')) return '📕';
  if (ct.startsWith('application/zip') || ct.startsWith('application/x-')) return '📦';
  if (ct.startsWith('text/')) return '📝';
  return '📄';
}

function dirIcon() { return '📁'; }

function isPreviewable(ct) {
  return ct && (ct.startsWith('image/') || ct.startsWith('video/') || ct.startsWith('application/pdf'));
}

// ── API calls ──
async function api(url) {
  const resp = await fetch(url);
  const data = await resp.json();
  if (!data.ok) throw new Error(data.error || 'API error');
  return data;
}

async function apiPost(url) {
  const resp = await fetch(url, { method: 'POST' });
  const data = await resp.json();
  if (!data.ok) throw new Error(data.error || 'API error');
  return data;
}

// ── Thumbnail URL helper ──
function thumbUrl(path, size) {
  return '/api/thumbnail?path=' + encodeURIComponent(path) + '&size=' + (size || 'sm');
}

function fileUrl(path) {
  return '/api/file/content?path=' + encodeURIComponent(path);
}

function renderReel(data, startPath) {
  state.currentDir = data.current || null;
  state.total = data.subdirs.length + data.files.length;

  // Only media files, no folders
  const mediaFiles = data.files.filter(f => isPreviewable(f.content_type || ''));
  if (mediaFiles.length === 0) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><h3>No media</h3><p>No images or videos in this folder</p></div>';
    document.getElementById('pagination').innerHTML = '';
    renderBreadcrumbs(data.path);
    return;
  }

  // Find starting index
  let startIdx = 0;
  if (state.reelStartPath) {
    const found = mediaFiles.findIndex(f => f.path === state.reelStartPath);
    if (found >= 0) startIdx = found;
    state.reelStartPath = null;
  }

  const html = [];
  html.push(`<div class="stats-bar">
    <span class="stat-item">📁 <span class="stat-val">${data.subdirs.length}</span> folders</span>
    <span class="stat-item">🎬 <span class="stat-val">${mediaFiles.length}</span> media</span>
    ${data.current ? `<span class="stat-item">📍 ${esc(data.current.name)}</span>` : ''}
  </div>`);

  html.push('<div class="reel-view" id="reelView">');
  html.push('<div class="reel-counter" id="reelCounter"></div>');

  // Render starting item with sm thumbnail for instant load
  const item = mediaFiles[startIdx];
  const ct = item.content_type || '';
  const isVideo = ct.startsWith('video/');
  const itemClass = 'reel-item active';
  html.push(`<div class="${itemClass}" data-index="${startIdx}" data-total="${mediaFiles.length}" onclick="event.stopPropagation();showFile('${esc(item.path)}')">`);
  if (isVideo) {
    html.push(`<video src="${fileUrl(item.path)}" muted loop playsinline autoplay preload="auto" poster="${thumbUrl(item.path, 'sm')}" 
              onerror="this.style.display='none';this.nextElementSibling.style.display='block'"
              onclick="event.stopPropagation();openPreview(this)"></video>
               <img src="${fileUrl(item.path)}" style="display:none" 
                    onclick="event.stopPropagation();openPreview(this)" data-path="${esc(item.path)}" data-idx="${startIdx}">`);
  } else {
    html.push(`<img src="${fileUrl(item.path)}" alt="${esc(item.name)}" 
              onclick="event.stopPropagation();openPreview(this)" data-path="${esc(item.path)}" data-idx="${startIdx}">`);
  }
  html.push(`<div class="reel-info">
    <div class="reel-name">${esc(item.name)}</div>
    <div>${fmtType(ct)} · ${fmtSize(item.size)}</div>
  </div>
</div>`);

  html.push('<div class="reel-hint">↑↓ swipe or use arrow keys</div>');
  html.push('</div>');

  document.getElementById('content').innerHTML = html.join('');
  document.getElementById('pagination').innerHTML = '';
  renderBreadcrumbs(data.path);
  updateReelCounter();

  // Autoplay initial video
  const firstVid = document.querySelector('#reelView video');
  if (firstVid) {
    const doPlay = () => { firstVid.currentTime = 0; firstVid.play().catch(()=>{}); };
    if (firstVid.readyState >= 2) doPlay();
    else firstVid.addEventListener('canplay', doPlay, { once: true });
  }

  // Store media list for swipe nav
  state._reelMedia = mediaFiles;
}

// Reel navigation
function reelNav(dir) {
  const media = state._reelMedia;
  if (!media || media.length <= 1) return;

  const current = document.querySelector('.reel-item.active');
  if (!current) return;

  const curIdx = parseInt(current.dataset.index || '0', 10);
  const nextIdx = curIdx + dir;
  if (nextIdx < 0 || nextIdx >= media.length) return;

  // Pause video in current
  const curVid = current.querySelector('video');
  if (curVid) { curVid.pause(); }

  // Build new item HTML
  const item = media[nextIdx];
  const ct = item.content_type || '';
  const isVideo = ct.startsWith('video/');
  let mediaHtml;
  if (isVideo) {
    mediaHtml = `<video src="${fileUrl(item.path)}" muted loop playsinline preload="auto" poster="${thumbUrl(item.path, 'sm')}"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='block'"
                 onclick="event.stopPropagation();openPreview(this)"></video>
                 <img src="${fileUrl(item.path)}" style="display:none"
                      onclick="event.stopPropagation();openPreview(this)" data-path="${esc(item.path)}" data-idx="${nextIdx}">`;
  } else {
    mediaHtml = `<img src="${fileUrl(item.path)}" alt="${esc(item.name)}"
                 onclick="event.stopPropagation();openPreview(this)" data-path="${esc(item.path)}" data-idx="${nextIdx}">`;
  }

  current.innerHTML = mediaHtml + `<div class="reel-info">
    <div class="reel-name">${esc(item.name)}</div>
    <div>${fmtType(ct)} · ${fmtSize(item.size)}</div>
  </div>`;
  current.dataset.index = nextIdx;
  current.onclick = `event.stopPropagation();showFile('${esc(item.path)}')`;

  // Play video if present (wait for canplay)
  const newVid = current.querySelector('video');
  if (newVid) {
    const doPlay = () => { newVid.currentTime = 0; newVid.play().catch(()=>{}); };
    if (newVid.readyState >= 2) doPlay();
    else newVid.addEventListener('canplay', doPlay, { once: true });
  }

  updateReelCounter();
  
  // Preload adjacent items
  preloadReelItem(nextIdx - 1);
  preloadReelItem(nextIdx + 1);
}

function preloadReelItem(idx) {
  // Could add link preload here in future
}

function updateReelCounter() {
  const active = document.querySelector('.reel-item.active');
  const counter = document.getElementById('reelCounter');
  if (!active || !counter) return;
  const idx = parseInt(active.dataset.index || '0', 10) + 1;
  const total = parseInt(active.dataset.total || '0', 10);
  if (total > 0) counter.textContent = idx + ' / ' + total;
}

function renderBreadcrumbs(path) {
  const parts = path.split('/').filter(Boolean);
  let html = '<a href="#" onclick="showBrowse(\'/\')">Koofr</a>';
  let acc = '';
  for (const p of parts) {
    acc += '/' + p;
    html += `<span class="sep">/</span><a href="#" onclick="showBrowse('${esc(acc)}')">${esc(p)}</a>`;
  }
  document.getElementById('breadcrumbs').innerHTML = html;
}

function renderSearch(data) {

  document.getElementById('filterCount').textContent =
    `${data.total} result${data.total !== 1 ? 's' : ''}`;

  const html = [];
  const fileList = data.results;

  if (data.total === 0) {
    html.push('<div class="empty-state"><h3>No results</h3>');

    document.getElementById('pagination').innerHTML = '';

  }

  html.push(`<div class="stats-bar">
    <span class="stat-item">📄 ${data.total} file${data.total !== 1 ? 's' : ''} found</span>
  </div>`);

  html.push('<table class="file-table"><thead><tr>');
  html.push('<th class="col-thumb"></th><th>Name</th><th class="col-size">Size</th>');
  html.push('<th class="col-date">Modified</th><th class="col-type">Type</th>');
  html.push('</tr></thead><tbody>');

  for (let fi = 0; fi < fileList.length; fi++) {
    const f = fileList[fi];
    const ct = f.content_type || '';
    const prev = isPreviewable(ct);
    let thumbHtml;
    if (prev) {
      thumbHtml = `<img src="${thumbUrl(f.path, 'sm')}" loading="lazy" data-idx="${fi}" onclick="event.stopPropagation();showReelFrom('${esc(f.path)}')" onerror="this.parentElement.innerHTML='<div class=thumb-placeholder>${fileIcon(f)}</div>'">`;
    } else {
      thumbHtml = `<div class="thumb-placeholder">${fileIcon(f)}</div>`;
    }
    const dir = f.parent_path || '/';
    html.push(`<tr style="cursor:pointer" onclick="showFile('${esc(f.path)}')">
      <td class="col-thumb"><div class="thumb-cell">${thumbHtml}</div></td>
      <td class="file-name">
        <span style="color:var(--text2);font-size:11px">${esc(dir)}/</span><br>
        <a href="/api/file/content?path=${encodeURIComponent(f.path)}" target="_blank">${esc(f.name)}</a>
      </td>
      <td class="col-size">${fmtSize(f.size)}</td>
      <td class="col-date">${fmtDate(f.modified)}</td>
      <td class="col-type">${fmtType(f.content_type)}</td>
    </tr>`);
  }

  html.push('</tbody></table>');
  document.getElementById('content').innerHTML = html.join('');

  // Pagination
  if (data.pages > 1) renderPagination(data);
}

function renderPagination(data) {
  let html = '';
  const p = data.page;
  const total = data.pages;

  html += `<button class="page-btn" onclick="goSearch(1)" ${p<=1?'disabled':''}>&#xAB;</button>`;

  let start = Math.max(1, p - 3);
  let end = Math.min(total, p + 3);
  if (start > 1) html += '<span class="page-btn" disabled>...</span>';
  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn ${i===p?'active':''}" onclick="goSearch(${i})">${i}</button>`;
  }
  if (end < total) html += '<span class="page-btn" disabled>...</span>';

  html += `<button class="page-btn" onclick="goSearch(${total})" ${p>=total?'disabled':''}>&#xBB;</button>`;
  document.getElementById('pagination').innerHTML = html;
}

// ── Preview Lightbox ──

function buildPreviewList() {
  // Collect all previewable files from the current view in DOM order
  const imgs = document.querySelectorAll('.thumb-cell img[data-idx]');
  if (imgs.length > 0) {
    // Table view
    return Array.from(imgs).map(img => {
      const row = img.closest('tr');
      const link = row ? row.querySelector('td.file-name a') : null;
      const href = link ? link.getAttribute('href') : '';
      const path = decodeURIComponent((href || '').split('path=')[1] || '');
      const name = link ? link.textContent : '';
      return { path, name };
    });
  }
  // Grid view: collect from grid-card onclick attributes
  const gridCards = document.querySelectorAll('.grid-card');
  if (gridCards.length > 0) {
    const items = [];
    gridCards.forEach(card => {
      const onclick = card.getAttribute('onclick') || '';
      const match = onclick.match(/showFile\('([^']+)'\)/);
      if (match) {
        const path = decodeURIComponent(match[1]);
        const nameEl = card.querySelector('.grid-name');
        const name = nameEl ? nameEl.textContent : path.split('/').pop();
        items.push({ path, name });
      }
    });
    return items;
  }
  // Reel view: collect from reel-item media elements
  const reelItems = document.querySelectorAll('.reel-item');
  const items = [];
  reelItems.forEach(el => {
    const media = el.querySelector('img[data-idx], video[data-idx]');
    if (media) {
      const path = decodeURIComponent(media.getAttribute('data-path') || '');
      const nameEl = el.querySelector('.reel-name');
      const name = nameEl ? nameEl.textContent : '';
      if (path) items.push({ path, name });
    }
  });
  return items;
}

function openPreview(imgEl) {
  previewItems = buildPreviewList();
  if (previewItems.length === 0) return;

  const idxAttr = imgEl.getAttribute('data-idx');
  previewIndex = idxAttr !== null ? parseInt(idxAttr, 10) : 0;
  if (isNaN(previewIndex) || previewIndex >= previewItems.length) previewIndex = 0;

  showPreviewItem(previewIndex);
}

function showPreviewItem(index) {
  if (index < 0 || index >= previewItems.length) return;
  previewIndex = index;
  const item = previewItems[index];

  const overlay = document.getElementById('previewOverlay');
  const img = document.getElementById('previewImage');
  const name = document.getElementById('previewName');
  const link = document.getElementById('previewOpenLink');

  // Show large thumbnail
  img.src = thumbUrl(item.path, 'lg');
  img.alt = item.name;
  name.textContent = item.name;
  link.href = '/api/file/content?path=' + encodeURIComponent(item.path);

  document.getElementById('previewMeta').textContent =
    `${index + 1} / ${previewItems.length}`;

  document.getElementById('prevBtn').disabled = index <= 0;
  document.getElementById('nextBtn').disabled = index >= previewItems.length - 1;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function previewNav(direction) {
  const idx = previewIndex + direction;
  if (idx >= 0 && idx < previewItems.length) {
    showPreviewItem(idx);
  }
}

function closePreview(e) {
  if (e && e.target !== e.currentTarget) return; // only on overlay click
  document.getElementById('previewOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Navigation ──

async function showReelFrom(path) {
  state.reelStartPath = path;
  state.viewMode = 'reel';
  if (state.view === 'browse') {
    const dir = path.split('/').slice(0, -1).join('/') || '/';
    state.path = dir;
    await showBrowse(dir);
  } else if (state.query) {
    await goSearch(state.page);
  }
}

async function showBrowse(path) {
  state.view = 'browse';
  state.path = path;
  state.page = 1;
  state.startPath = null;

  document.getElementById('searchInput').value = '';
  document.getElementById('content').innerHTML = '<div class="loading">Loading...</div>';
  document.getElementById('pagination').innerHTML = '';
  document.getElementById('filterCount').textContent = '';

  try {
    const data = await api(`/api/browse?path=${encodeURIComponent(path)}`);
    if (state.viewMode === 'grid') renderGrid(data);
    else if (state.viewMode === 'reel') renderReel(data);
    else renderBrowse(data);
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="error-state">Error: ${esc(e.message)}</div>`;
  }
}

async function goSearch(page) {
  state.view = 'search';
  state.page = page;
  const q = state.query;
  const t = state.type;

  document.getElementById('content').innerHTML = '<div class="loading">Searching...</div>';

  try {
    const data = await api(`/api/search?q=${encodeURIComponent(q)}&type=${t}&page=${page}&per_page=${state.perPage}`);
    renderSearch(data);
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="error-state">Error: ${esc(e.message)}</div>`;
  }
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) {
    showBrowse('/');
    return;
  }
  state.query = q;
  state.page = 1;
  state.view = 'search';
  goSearch(1);
}

async function showFile(path) {
  try {
    const data = await api(`/api/file?path=${encodeURIComponent(path)}`);
    const f = data.file;
    document.getElementById('modalTitle').textContent = f.name;
    document.getElementById('modalBody').innerHTML = `
      <tr><td>Type</td><td>${fmtType(f.content_type)}</td></tr>
      <tr><td>Size</td><td>${fmtSize(f.size)}</td></tr>
      <tr><td>Modified</td><td>${fmtDate(f.modified)}</td></tr>
      <tr><td>Open</td><td><a href="/api/file/content?path=${encodeURIComponent(f.path)}" target="_blank" style="color:var(--accent)">Open in new tab ↗</a></td></tr>
      <tr><td>Path</td><td style="font-size:12px;color:var(--text2)">${esc(f.path)}</td></tr>
      <tr><td>MD5</td><td style="font-size:11px;font-family:monospace">${f.hash || '-'}</td></tr>
    `;
    document.getElementById('fileModal').style.display = 'flex';
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function closeModal(e) {
  document.getElementById('fileModal').style.display = 'none';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Keyboard nav for preview ──
document.addEventListener('keydown', (e) => {
  const overlay = document.getElementById('previewOverlay');
  if (!overlay.classList.contains('open')) return;
  if (e.key === 'Escape') closePreview();
  if (e.key === 'ArrowLeft') previewNav(-1);
  if (e.key === 'ArrowRight') previewNav(1);
});

// ── Initialise ──

async function init() {
  // Status
  try {
    const st = await api('/api/status');
    document.getElementById('version').textContent = 'v' + st.version;
    document.getElementById('statusDot').className = st.configured ? 'dot online' : 'dot offline';
    document.getElementById('statusText').textContent =
      st.configured ? `Online · ${st.mount_name} · ${st.files} files, ${st.dirs} dirs` : 'Not configured';
  } catch (e) {
    document.getElementById('statusText').textContent = 'Offline';
  }

  // Search handlers
  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(doSearch, 300);
  });
  document.getElementById('searchInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { clearTimeout(searchTimer); doSearch(); }
  });

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.type = btn.dataset.type;
      if (state.view === 'search' && state.query) {
        goSearch(1);
      } else if (state.view === 'browse') {
        showBrowse(state.path);
      }
    });
  });

  // View toggle
  function setViewMode(mode) {
    state.viewMode = mode;
    state.reelStartPath = null;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === mode));
    if (state.view === 'browse') showBrowse(state.path);
    else if (state.query) goSearch(state.page);
  }
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => setViewMode(btn.dataset.view));
  });

  // Reel keyboard nav
  document.addEventListener('keydown', (e) => {
    if (state.viewMode !== 'reel') return;
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { reelNav(-1); e.preventDefault(); }
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { reelNav(1); e.preventDefault(); }
  });

  // Reel mouse wheel
  let _reelWheelT = 0;
  document.addEventListener('wheel', (e) => {
    if (state.viewMode !== 'reel') return;
    if (document.getElementById('reelView') === null) return;
    const now = Date.now();
    if (now - _reelWheelT < 400) return;
    const dir = e.deltaY > 0 ? 1 : -1;
    if (Math.abs(e.deltaY) < 20) return;
    _reelWheelT = now;
    reelNav(dir);
    e.preventDefault();
  }, { passive: false });

  // Reel pointer swipe
  let _reelPtr = null;
  const onReelPtrDown = (e) => {
    if (state.viewMode !== 'reel') return;
    _reelPtr = { y: e.clientY, t: Date.now() };
  };
  const onReelPtrUp = (e) => {
    if (state.viewMode !== 'reel' || !_reelPtr) return;
    const dy = e.clientY - _reelPtr.y;
    const dt = Date.now() - _reelPtr.t;
    _reelPtr = null;
    if (Math.abs(dy) > 40 && dt < 500) {
      reelNav(dy < 0 ? 1 : -1);
    }
  };
  document.addEventListener('pointerdown', onReelPtrDown);
  document.addEventListener('pointerup', onReelPtrUp);

  // Load browse view
  showBrowse('/');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
